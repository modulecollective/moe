<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.ID}} — moe</title>
<script>
(function () {
  var t = localStorage.getItem('moe-theme') ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = t;
})();
</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <header class="page-header">
    <div class="banner">
      <a href="/" class="banner-bar">▓▒░ MINISTRY OF EVERYTHING ░▒▓</a>
      <div class="banner-sub">{{.Project}}/{{.Slug}}</div>
    </div>
    <button id="theme-toggle" type="button">theme</button>
  </header>

  <div id="poll-target">
    {{template "run_fragment.html" .}}
  </div>
</main>
<script>
document.getElementById('theme-toggle').addEventListener('click', function () {
  var cur = document.documentElement.dataset.theme ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('moe-theme', next);
});
(function () {
  var target = document.getElementById('poll-target');
  if (!target) return;
  var timer = setInterval(function () {
    fetch(location.pathname + '/fragment', {cache: 'no-store'})
      .then(function (r) {
        if (r.status === 404) { clearInterval(timer); return null; }
        return r.text();
      })
      .then(function (html) {
        if (html === null || html === undefined) return;
        target.innerHTML = html;
        if (target.firstElementChild &&
            target.firstElementChild.dataset.stop === '1') {
          clearInterval(timer);
        }
      })
      .catch(function () { /* transient; try again on next tick */ });
  }, 2000);
})();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.ID}} — moe</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script>
(function () {
  var t = localStorage.getItem('moe-theme') ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = t;
})();
</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <header class="page-header">
    <div class="banner">
      <a href="/" class="banner-bar">▓▒░ MINISTRY OF EVERYTHING ░▒▓</a>
      <div class="banner-sub">{{.Project}}/{{.Slug}}</div>
    </div>
    <div class="header-actions">
      <a class="header-action" href="/run/new">new run</a>
      <button id="theme-toggle" type="button">theme</button>
    </div>
  </header>

  {{template "run_fragment.html" .}}
</main>
<script>
document.getElementById('theme-toggle').addEventListener('click', function () {
  var cur = document.documentElement.dataset.theme ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('moe-theme', next);
});
</script>
</body>
</html>

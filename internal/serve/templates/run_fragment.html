<div class="run-fragment">
  {{if .ErrorBanner}}<p class="error">{{.ErrorBanner}}</p>{{end}}

  <p class="meta">{{if .Started}}started {{.Started}} · {{end}}<span class="status {{if .Live}}live{{else}}exited{{end}}">{{.Status}}</span></p>

  {{if .PromoteEnabled}}
  <section class="promote">
    <h2>promote to sdlc</h2>
    <form method="post" action="/run/{{.Project}}/{{.Slug}}/promote" class="new-run">
      {{if .Workspaces}}
      <label>
        workspace <span class="hint">(optional)</span>
        <select name="workspace">
          <option value="">(none)</option>
          {{range .Workspaces}}<option value="{{.Name}}" data-project="{{.Project}}">{{.Label}}</option>{{end}}
        </select>
      </label>
      {{end}}

      <label>
        agent <span class="hint">(optional; resolves to default if blank)</span>
        <select name="agent">
          {{range .Agents}}<option value="{{.}}">{{if .}}{{.}}{{else}}(default){{end}}</option>{{end}}
        </select>
      </label>

      <button type="submit">promote</button>
    </form>
  </section>
  {{end}}

  {{if .CanvasLinks}}
  <section class="canvases">
    <h2>canvases</h2>
    <ul>
      {{range .CanvasLinks}}
      <li>
        <a class="slug" href="{{.URL}}">{{.Stage}}</a>
        <span class="when">{{.ModTime}}</span>
      </li>
      {{end}}
    </ul>
  </section>
  {{end}}
</div>

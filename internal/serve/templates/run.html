<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.ID}} — moe</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <header class="page-header">
    <h1><a href="/">moe</a> · {{.Project}}/{{.Slug}}</h1>
    <p class="meta">started {{.Started}} · <span class="status {{if .Live}}live{{else}}exited{{end}}">{{.Status}}</span></p>
  </header>

  {{if .CanvasLinks}}
  <section class="canvases">
    <h2>canvases</h2>
    <ul>
      {{range .CanvasLinks}}
      <li><span class="slug">{{.Stage}}</span> · {{.ModTime}}</li>
      {{end}}
    </ul>
  </section>
  {{end}}

  {{if .Buttons}}
  <section class="prompt">
    <h2>chain prompt</h2>
    <div class="buttons">
      {{range .Buttons}}
      <form method="post" action="/run/{{$.Project}}/{{$.Slug}}/key" class="key-form">
        <input type="hidden" name="key" value="{{.Key}}">
        <button type="submit" class="key {{.Class}}">{{.Label}}</button>
      </form>
      {{end}}
    </div>
  </section>
  {{end}}

  <section class="activity">
    <h2>activity</h2>
    <pre class="log">{{.Tail}}</pre>
  </section>
</main>
</body>
</html>

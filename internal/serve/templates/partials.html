{{define "head"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script>
// Pick the palette before paint to avoid a flash. Saved choice wins,
// else honour the OS preference.
(function () {
  var t = localStorage.getItem('moe-theme') ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = t;
})();
</script>
<link rel="stylesheet" href="/static/style.css">
{{end}}

{{define "headeractions"}}
<details class="menu">
  <summary class="menu-button" aria-label="menu" title="menu">☰</summary>
  <div class="menu-panel">
    <a href="/">dashboard</a>
    <a href="/lore">lore</a>
    <a href="/projects">projects</a>
    <button id="theme-toggle" class="theme-toggle" type="button"><span class="theme-label-dark">dark mode</span><span class="theme-label-light">light mode</span></button>
  </div>
</details>
{{end}}

{{define "themejs"}}
<script>
document.getElementById('theme-toggle').addEventListener('click', function () {
  var cur = document.documentElement.dataset.theme ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('moe-theme', next);
});
</script>
{{end}}

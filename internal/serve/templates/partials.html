{{define "head"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script>
// Pick the palette before paint to avoid a flash. Saved choice wins,
// else honour the OS preference.
(function () {
  var t = localStorage.getItem('moe-theme') ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = t;
})();
</script>
<link rel="stylesheet" href="/static/style.css">
{{end}}

{{define "headeractions"}}
<details class="menu">
  <summary class="menu-button" aria-label="menu" title="menu">☰</summary>
  <div class="menu-panel">
    <a href="/">dashboard</a>
    <a href="/lore">lore</a>
    <a href="/projects">projects</a>
    <button id="theme-toggle" class="theme-toggle" type="button"><span class="theme-label-dark">dark mode</span><span class="theme-label-light">light mode</span></button>
  </div>
</details>
{{end}}

{{define "bannerart"}}
  <pre class="banner-art">{{range .Histogram}}{{.}}
{{end}}</pre>
  <pre class="banner-art" id="factory-art">{{range .FactoryArt}}{{.}}
{{end}}</pre>
  <script type="application/json" id="factory-frames">{{.FactoryFramesJSON}}</script>
  <script>
  // Cross-fade the factory art through its pre-baked frames. Progressive
  // enhancement: with JS off, reduced motion, or a single frame, the static
  // <pre> server-rendered above stays as-is. Targets #factory-art by id so
  // the histogram <pre> above it (also .banner-art) is left untouched.
  (function () {
    var data = document.getElementById('factory-frames');
    var art = document.getElementById('factory-art');
    if (!data || !art) return;
    var frames;
    try { frames = JSON.parse(data.textContent); } catch (e) { return; }
    if (!Array.isArray(frames) || frames.length <= 1) return;
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    // Match the server render exactly (trailing newline) so the two layers
    // are the same height and the grid cell doesn't jump when they swap.
    // Frame lines are server-baked span markup, so layers take innerHTML:
    // the bands are classified once in Go, never re-derived here.
    function paint(frame) { return frame.join('\n') + '\n'; }

    // Stack two <pre> layers in one grid cell and cross-fade their opacity.
    var stack = document.createElement('div');
    stack.className = 'banner-art-stack';
    art.parentNode.insertBefore(stack, art);
    stack.appendChild(art);
    var back = art.cloneNode(false);
    back.removeAttribute('id'); // one #factory-art is enough; back is a layer
    back.innerHTML = paint(frames[0]);
    back.style.opacity = '0';
    stack.appendChild(back);

    var layers = [art, back]; // [0] showing, [1] hidden
    var i = 0;
    setInterval(function () {
      i = (i + 1) % frames.length;
      var hidden = layers[1];
      hidden.innerHTML = paint(frames[i]);
      layers[0].style.opacity = '0';
      hidden.style.opacity = '1';
      layers.reverse();
    }, 3000);
  })();
  </script>
{{end}}

{{define "themejs"}}
<script>
document.getElementById('theme-toggle').addEventListener('click', function () {
  var cur = document.documentElement.dataset.theme ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('moe-theme', next);
});
</script>
{{end}}

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: forbid raw exec.Command("git") outside internal/git
        run: |
          # Every git invocation must go through internal/git so the
          # index-lock retry, error shape, and tracing hook stay in
          # one place. Test files and the internal/git package itself
          # are exempt. `--exclude-dir=NAME` only matches by basename,
          # so we filter the internal/git path with a follow-up grep.
          hits=$(grep -RnE 'exec\.Command(Context)?\("git"' \
                      --include='*.go' \
                      --exclude='*_test.go' \
                      . | grep -v '^\./internal/git/' || true)
          if [ -n "$hits" ]; then
            echo "Forbidden raw git invocations (route through internal/git):"
            echo "$hits"
            exit 1
          fi

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:"
            echo "$out"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

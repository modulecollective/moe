<!doctype html>
<html lang="en">
<head>
{{template "head" .}}
<title>lore — MoE</title>
</head>
<body>
<main>
  <header class="page-header">
    <div class="banner">
      <a href="/" class="banner-bar">▓▒░ MINISTRY OF EVERYTHING ░▒▓</a>
      <div class="banner-sub">lore</div>
    </div>
    {{template "headeractions" .}}
  </header>

  <section class="dash-section">
    <h2><span>lore <span class="count">({{len .Entries}})</span></span></h2>
    {{if .Entries}}
    <ul class="rows">
      {{range .Entries}}
      <li class="row lore-row">
        <a class="slug" href="/lore/{{.Name}}">{{.Title}}</a>
        {{if .AppliesWhen}}<span class="note">{{.AppliesWhen}}</span>{{end}}
      </li>
      {{end}}
    </ul>
    {{else}}<p class="empty">no lore yet</p>{{end}}
  </section>
</main>
{{template "themejs" .}}
</body>
</html>

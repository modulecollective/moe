name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: forbid raw exec.Command("git") outside internal/git
        run: make check-git-boundary

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:"
            echo "$out"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.ID}} — moe</title>
<script>
(function () {
  var t = localStorage.getItem('moe-theme') ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = t;
})();
</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <header class="page-header">
    <div class="banner">
      <a href="/" class="banner-bar">▓▒░ MINISTRY OF EVERYTHING ░▒▓</a>
      <div class="banner-sub">{{.Project}}/{{.Slug}}</div>
      <p class="meta">started {{.Started}} · <span class="status {{if .Live}}live{{else}}exited{{end}}">{{.Status}}</span></p>
    </div>
    <button id="theme-toggle" type="button">theme</button>
  </header>

  {{if .CanvasLinks}}
  <section class="canvases">
    <h2>canvases</h2>
    <ul>
      {{range .CanvasLinks}}
      <li><span class="slug">{{.Stage}}</span> · {{.ModTime}}</li>
      {{end}}
    </ul>
  </section>
  {{end}}

  {{if .Buttons}}
  <section class="prompt">
    <h2>chain prompt</h2>
    <div class="buttons">
      {{range .Buttons}}
      <form method="post" action="/run/{{$.Project}}/{{$.Slug}}/key" class="key-form">
        <input type="hidden" name="key" value="{{.Key}}">
        <button type="submit" class="key {{.Class}}">{{.Label}}</button>
      </form>
      {{end}}
    </div>
  </section>
  {{end}}

  <section class="activity">
    <h2>activity</h2>
    <pre class="log">{{.Tail}}</pre>
  </section>
</main>
<script>
document.getElementById('theme-toggle').addEventListener('click', function () {
  var cur = document.documentElement.dataset.theme ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('moe-theme', next);
});
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>promote {{.Project}}/{{.Slug}} — MoE</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script>
(function () {
  var t = localStorage.getItem('moe-theme') ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = t;
})();
</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <header class="page-header">
    <div class="banner">
      <a href="/" class="banner-bar">▓▒░ MINISTRY OF EVERYTHING ░▒▓</a>
      <div class="banner-sub"><a href="/run/{{.Project}}/{{.Slug}}">{{.Project}}/{{.Slug}}</a> · promote</div>
    </div>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="toggle theme" title="toggle theme">◐</button>
  </header>

  {{if .ErrorBanner}}<p class="error">{{.ErrorBanner}}</p>{{end}}

  <form method="post" action="/run/{{.Project}}/{{.Slug}}/promote" class="new-run">
    {{if .Workflows}}
    <label>
      workflow
      <select name="workflow">
        {{range .Workflows}}<option value="{{.Name}}"{{if eq .Name $.Workflow}} selected{{end}}>{{.Name}}</option>{{end}}
      </select>
    </label>
    {{end}}

    {{if .Workspaces}}
    <label>
      workspace <span class="hint">(optional)</span>
      <select name="workspace">
        <option value="">(none)</option>
        {{range .Workspaces}}<option value="{{.Name}}" data-project="{{.Project}}">{{.Label}}</option>{{end}}
      </select>
    </label>
    {{end}}

    <label>
      agent <span class="hint">(optional; resolves to default if blank)</span>
      <select name="agent">
        {{range .Agents}}<option value="{{.}}">{{if .}}{{.}}{{else}}(default){{end}}</option>{{end}}
      </select>
    </label>

    <button type="submit">promote</button>
  </form>
</main>
<script>
document.getElementById('theme-toggle').addEventListener('click', function () {
  var cur = document.documentElement.dataset.theme ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('moe-theme', next);
});
</script>
</body>
</html>
